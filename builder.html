<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <title>Primo NFT Builder</title>
    <link rel="stylesheet" href="src/styles/main.css">
    <link rel="stylesheet" href="src/pages/builder.css">
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="builder.html" class="active">NFT Builder</a>
    </nav>

    <div class="builder-container">
        <div class="builder-sidebar">
            <h2>Trait Categories</h2>
            <div class="trait-categories">
                <button class="trait-category active" data-category="Background">Background</button>
                <button class="trait-category" data-category="Base">Base</button>
                <button class="trait-category" data-category="Face">Face</button>
                <button class="trait-category" data-category="Brows">Brows</button>
                <button class="trait-category" data-category="Clothing">Clothing</button>
                <button class="trait-category" data-category="Eyes">Eyes</button>
                <button class="trait-category" data-category="Hair">Hair</button>
                <button class="trait-category" data-category="Mouth">Mouth</button>
                <button class="trait-category" data-category="Accessories">Accessories</button>
            </div>

            <div class="trait-list">
                <!-- Traits will be loaded here dynamically -->
            </div>
        </div>

        <div class="builder-main">
            <div class="preview-container">
                <canvas id="previewCanvas"></canvas>
            </div>
            <div class="builder-controls">
                <button id="randomizeBtn">Randomize</button>
                <button id="downloadBtn">Download</button>
                <button id="resetBtn">Reset</button>
            </div>
        </div>
    </div>

    <script type="module" src="src/pages/builder.js" defer></script>
</body>
</html>
